name: 24/7 Crypto Market Monitor

on:
  schedule:
    # 每一小時執行 4 次 (每 15 分鐘一次)
    - cron: "*/15 * * * *"
  workflow_dispatch: # 支援手動觸發測試

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install requests loguru ccxt pandas

      - name: Run Market Scanner
        env:
          # 以下變數需在 GitHub Repo -> Settings -> Secrets 中設定
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          USDT_TWD_RATE: 31.4
        run: |
          python scripts/top_20_scanner.py
